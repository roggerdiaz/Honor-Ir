<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HONOR – Registro de Ventas</title>

<style>
:root{
  --honor-blue:#0078d4;
  --bg-soft:#1e6fb9;
  --bg-card:#ffffff;
  --text-main:#111827;
  --text-muted:#6b7280;
  --border-soft:#c7d6ea;
  --radius:14px;
}
/* ===== ADMIN RESPONSIVE (MÓVIL) ===== */
@media (max-width: 900px) {

  .box {
    padding: 16px;
    margin: 90px 12px;
  }

  #tablaAdmin {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  #tablaAdmin table {
    min-width: 1200px;
  }

  #tablaAdmin th,
  #tablaAdmin td {
    font-size: 12px;
    padding: 6px;
  }

  #tablaAdmin td button {
    font-size: 12px;
    padding: 4px 8px;
  }
}

body{
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg-soft);
  margin:0;
}
.hidden{display:none!important}

/* LOGIN */
.login{
  width:92%;
  max-width:560px;
  background:#ffffff;
  padding:40px;
  border-radius:14px;
  box-shadow:0 25px 50px rgba(0,0,0,.15);
  position:fixed;
  inset:0;
  margin:auto;
  height:max-content;
}
.honor-logo{text-align:center;font-size:36px;font-weight:bold;letter-spacing:6px;color:#0078d4;margin-bottom:6px}
.honor-sub{text-align:center;font-size:14px;color:#6b7280;margin-bottom:26px}
.login label{font-size:14px;font-weight:bold;display:block;margin-bottom:6px}
.login input,.login select{
  width:100%;height:48px;padding:10px 12px;margin-bottom:16px;
  font-size:15px;border-radius:8px;border:1px solid #e5e7eb;background:#f8fbff;
}
.login button{
  width:100%;height:50px;font-size:16px;font-weight:bold;
  background:#0078d4;color:#fff;border:none;border-radius:8px;cursor:pointer
}
.error-msg{
  display:none;background:#fee2e2;color:#dc2626;
  padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:12px
}

/* TOP BAR */
.top-bar{position:absolute;top:24px;right:32px}
.top-bar button{
  padding:14px 24px;font-size:15px;font-weight:600;
  border:none;border-radius:10px;cursor:pointer;color:white
}
.reset{background:#64748b;margin-right:10px}
.logout{background:#0b5ca8}

/* EDC */
.container{display:flex;gap:36px;padding:88px 48px 48px}
.resumen{
  width:340px;background:#fff;padding:24px;border-radius:14px;
  box-shadow:0 25px 50px rgba(0,0,0,.12);display:flex;flex-direction:column
}
.resumen textarea{
  flex:1;background:#eef3f9;border:1px solid var(--border-soft);
  border-radius:10px;padding:14px;font-family:Courier New;font-size:14px;resize:none
}
.main{flex:1}
form{
  background:#fff;padding:40px;border-radius:14px;
  max-width:1050px;box-shadow:0 25px 50px rgba(0,0,0,.12)
}
.main label{font-size:14px;font-weight:700;margin-top:22px;display:block}
.main input,.main select{
  width:100%;height:48px;padding:10px 12px;font-size:15px;
  border-radius:8px;border:1px solid var(--border-soft);
  background:#eef3f9;margin-bottom:18px
}
.referencias{
  display:grid;grid-template-columns:320px 140px;gap:12px;align-items:center
}
.referencias input{text-align:center}
button[type="submit"]{
  width:100%;height:50px;font-size:16px;font-weight:600;
  background:#0078d4;color:white;border:none;border-radius:8px;cursor:pointer
}

.resumen{
  position: sticky;
  top: 96px;              /* debajo del top-bar */
  height: calc(100vh - 140px);
  z-index: 5;
}

.resumen textarea{
  height: 100%;
  overflow-y: auto;
}

/* ADMIN */
.box{
  background:white;padding:40px;border-radius:14px;
  max-width:1400px;margin:120px auto
}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #e5e7eb;padding:8px;font-size:13px}
th{background:#0078d4;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <div class="honor-logo">HONOR</div>
  <div class="honor-sub">Colombia · Registro de Ventas</div>
  <label>Usuario</label>
  <select id="usuario">
    <option value="">Seleccione</option>
    <option>Daniel Vanoy</option>
    <option>Diana Pardo</option>
    <option>Marcela Huertas</option>
    <option>Hector Guerrero</option>
    <option>Vanessa Sarmiento</option>
    <option>Viviana Mora</option>
    <option>Jhonatan Romero</option>
    <option>Mauricio Lazo</option>
    <option>Jose Valencia</option>
    <option>Jose Lujan</option>
    <option>Vivián Avellaneda</option>
    <option>admin</option>
  </select>
  <label>Contraseña</label>
  <input type="password" id="clave">
  <div class="error-msg" id="errorLogin">Credenciales incorrectas</div>
  <button onclick="login()">Ingresar</button>
</div>

<!-- TOP -->
<div class="top-bar hidden" id="topBar">
  <button class="reset" onclick="limpiarFormulario()">Limpiar</button>
  <button class="logout" onclick="salirMenu()">Salir</button>
</div>

<!-- VISTA EDC -->
<div class="container hidden" id="vistaEDC">
  <div class="resumen">
    <h3>HONOR - IR</h3>
<p style="margin:0 0 12px;font-size:13px;color:#6b7280">
  Resumen copiable
</p>
    <textarea id="textoResumen" readonly></textarea>
  </div>
  <div class="main">
    <form id="formEDC">
      <label>EDC</label><input id="edc" readonly>
      <label>Regional</label><input id="regional" readonly>
      <label>Ciudad</label><input id="ciudad" required>
      <label>Dirección</label><input id="direccion" required>
      <label>Canal</label>
      <select id="canal" onchange="cargarReferenciasPorCanal();actualizarResumen()">
        <option value="">Seleccione Canal</option>
        <option>COMQUIA</option>
        <option>TOYAR</option>
      </select>
<label>Cliente</label>
<input id="cliente" oninput="actualizarResumen()" required>

<label>Dueño del Punto</label>
<input id="dueno" required>

<label>Encargado</label>
<input id="encargado" required>

<label>Teléfono (Colombia)</label>
<input id="telefono" required pattern="[0-9]{10}">

<label>¿Cuenta con Inventario?</label>
<select id="tieneInventario" onchange="toggleInventario()" required>
  <option value="">Seleccione</option>
  <option value="Sí">Sí</option>
  <option value="No">No</option>
</select>

<label>Cantidad de Inventario</label>
<input type="number" id="cantidadInventario" value="0" disabled>

      <label>Referencias</label>
      <div id="refsCanal"></div>
      <h3>Accesorios y ECO</h3>
      <div id="refsAccesorios"></div>
      <button type="submit">Guardar Registro</button>
    </form>
  </div>
</div>

<!-- ADMIN -->
<div class="box hidden" id="vistaAdmin">
  <h2>HONOR - IR</h2>
<p style="margin-top:-10px;color:#6b7280;font-size:13px">
  Registros de Inyección
</p>

  <button onclick="descargarExcel()">Descargar Excel</button>
  <table id="tablaAdmin">

    <thead>
  <tr>
    <th>Fecha</th>
    <th>EDC</th>
    <th>Regional</th>
    <th>Canal</th>
    <th>Cliente</th>
    <th>Ciudad</th>
    <th>Dirección</th>
    <th>Dueño</th>
    <th>Encargado</th>
    <th>Teléfono</th>
    <th>Inventario</th>
    <th>Cant.</th>
    <th>Total</th>
    <th>Detalle</th>
    <th>Acción</th>
  </tr>
</thead>

    </thead>
    <tbody></tbody>
  </table>
</div>
<script>
const usuarios = {
  admin:"081065",
  "Daniel Vanoy":"6505","Diana Pardo":"2553","Marcela Huertas":"6277",
  "Hector Guerrero":"8882","Vanessa Sarmiento":"9428","Viviana Mora":"4784",
  "Jhonatan Romero":"5154","Mauricio Lazo":"7474","Jose Valencia":"5958",
  "Jose Lujan":"2996","Vivián Avellaneda":"2087"
};

const region = {
  "Daniel Vanoy":"Center 1","Diana Pardo":"Center 2","Marcela Huertas":"Center 3",
  "Hector Guerrero":"Coast 1","Vanessa Sarmiento":"Coast 2",
  "Viviana Mora":"Coffee & West 1","Jhonatan Romero":"Coffee & West 2",
  "Mauricio Lazo":"Coffee & West 3","Jose Valencia":"East 1",
  "Jose Lujan":"East 2","Vivián Avellaneda":"East 3"
};


const referenciasPorCanal = {
  COMQUIA: [
    "H400 Smart + 6","H400 Smart +12","Honor 200 Smart","Honor Magic 7 Lite 256Gb","Honor Magic 7 Lite 512Gb","Honor Magic 8 Lite 256Gb","Honor Pad X8A 128GB","Honor Play 9A 64GB","Honor Play 9C 256GB","Honor X5B 128GB",   "Honor X5B Plus",
    "HONOR X5C 128GB","HONOR X5C 64GB","HONOR X6B 128GB","Honor X6B 256GB","HONOR X6C 128GB","Honor X6C 256GB","HONOR X7D","HONOR X8C 512GB","Honor X8D 512GB","X6C 256 SS"
  ],
  TOYAR: [
    "H400 Smart +12","Honor Play 9A 128GB","HONOR X5C 64GB","HONOR X6C 128GB","Honor X6C 256GB","HONOR X8C 512GB","Honor X8D 512GB","Honor X9C Smart 256GB"
  ]
};

  const accesoriosEco = ["Honor Headphone","Honor OWS","Honor Clip","Airfryer"];

/* LOGIN */
function login(){
  if(!usuarios[usuario.value] || usuarios[usuario.value] !== clave.value){
    errorLogin.style.display="block";
    return;
  }

  loginBox.classList.add("hidden");
  topBar.classList.remove("hidden");

  if(usuario.value==="admin"){
    vistaAdmin.classList.remove("hidden");
    cargarTablaAdmin();
  }else{
    vistaEDC.classList.remove("hidden");
    edc.value=usuario.value;
    regional.value=region[usuario.value];
  }
}

/* REFERENCIAS */
function cargarReferenciasPorCanal(){
  refsCanal.innerHTML="";
  refsAccesorios.innerHTML="";

  referenciasPorCanal[canal.value]?.forEach(r=>{
    refsCanal.innerHTML+=`
      <div class="referencias">
        <div>${r}</div>
        <input type="number" min="0" data-ref="${r}" oninput="actualizarResumen()">
      </div>`;
  });

  accesoriosEco.forEach(r=>{
    refsAccesorios.innerHTML+=`
      <div class="referencias">
        <div>${r}</div>
        <input type="number" min="0" data-ref="${r}" oninput="actualizarResumen()">
      </div>`;
  });
}

/* INVENTARIO */
function toggleInventario(){
  cantidadInventario.disabled = tieneInventario.value !== "Sí";
  if(tieneInventario.value !== "Sí") cantidadInventario.value = 0;
  actualizarResumen();
}

/* RESUMEN */
function actualizarResumen(){
  let total=0, detalle="";
  document.querySelectorAll("[data-ref]").forEach(i=>{
    if(i.value>0){
      total+=Number(i.value);
      detalle+=`• ${i.dataset.ref} → ${i.value}\n`;
    }
  });

  textoResumen.value=`TOTAL: ${total}\n${detalle}`;
}

/* GUARDAR */
formEDC.addEventListener("submit",e=>{
  e.preventDefault();

  fetch("https://ir.infinityfreeapp.com/guardar.php",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      fecha:new Date().toLocaleString(),
      edc:edc.value,
      regional:regional.value,
      canal:canal.value,
      cliente:cliente.value,
      ciudad:ciudad.value,
      total:[...document.querySelectorAll("[data-ref]")]
            .reduce((s,i)=>s+Number(i.value||0),0),
      detalle:textoResumen.value
    })
  }).then(()=>alert("✅ Registro guardado"));
});

/* ADMIN */
async function cargarTablaAdmin(){
  const data = await (await fetch("https://ir.infinityfreeapp.com/listar.php")).json();
  tablaAdmin.querySelector("tbody").innerHTML =
    data.map(r=>`
      <tr>
        <td>${r.fecha}</td>
        <td>${r.edc}</td>
        <td>${r.cliente}</td>
        <td>${r.total}</td>
      </tr>`).join("");
}
/* ===== DESCARGAR EXCEL ===== */
async function descargarExcel(){
  const res = await fetch("https://ir.infinityfreeapp.com/listar.php");
  const data = await res.json();

  let csv = "Fecha,EDC,Regional,Canal,Cliente,Ciudad,Total\n";

  data.forEach(r => {
    csv += `"${r.fecha}","${r.edc}","${r.regional}","${r.canal}","${r.cliente}","${r.ciudad}","${r.total}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "HONOR_Registros.csv";
  link.click();

  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
